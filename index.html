<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給料管理</title>

<link rel="manifest" href="manifest.json">

<style>
* { box-sizing: border-box; }

body {
  font-family: sans-serif;
  margin: 0;
  padding: 10px;
  background: #f5f5f5;
}

/* タブ */
.tab {
  display: flex;
  margin-bottom: 10px;
}

.tab button {
  flex: 1;
  padding: 10px;
  border: none;
  background: #ccc;
}

.tab button.active {
  background: #007AFF;
  color: white;
}

/* カード */
.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 12px;
}

/* 入力 */
input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 10px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 6px;
}

button {
  background: #007AFF;
  color: white;
  border: none;
}

/* チェック */
.checkbox-label {
  display: flex;
  align-items: center;
  gap: 8px;
}

.checkbox-label input {
  display: none;
}

.checkmark {
  width: 22px;
  height: 22px;
  border: 2px solid #ccc;
  border-radius: 4px;
  position: relative;
}

.checkbox-label input:checked + .checkmark {
  background: #007AFF;
}

.checkbox-label input:checked + .checkmark::after {
  content: "✓";
  color: white;
  position: absolute;
  left: 4px;
  top: -2px;
}

/* 一覧 */
.list-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.button-group {
  display: flex;
  gap: 5px;
}

.small-btn {
  padding: 5px 8px;
  font-size: 13px;
}

/* カレンダー */
#calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.day {
  padding: 6px;
  background: #fff;
  text-align: center;
  border-radius: 5px;
  cursor: pointer;
}

.selected {
  background: #007AFF;
  color: white;
}

/* グラフ */
.bar {
  background: #007AFF;
  margin: 5px 0;
  color: white;
  padding: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- タブ -->
<div class="tab">
  <button onclick="showPage('calc')" id="tabCalc" class="active">給料計算</button>
  <button onclick="showPage('report')" id="tabReport">レポート</button>
  <button onclick="location.reload()">更新</button>
</div>

<!-- 計算ページ -->
<div id="calcPage">

<div class="card">
<h2>給料計算</h2>

開始 <input type="time" id="start">
終了 <input type="time" id="end">

<select id="type">
  <option value="1250">運営</option>
  <option value="1350">作業</option>
</select>

<label class="checkbox-label">
  <input type="checkbox" id="manual">
  <span class="checkmark"></span>
  手入力
</label>

<div id="manualBox" style="display:none;">
  <input type="number" id="manualPay">
</div>

<button onclick="calc()">計算</button>

<h3 id="result"></h3>
</div>

<div class="card">
<h2>一覧</h2>

<input type="month" id="monthPicker">

<div id="calendar"></div>

<button onclick="saveData()">この日を保存</button>

<h3 id="total"></h3>
<ul id="list"></ul>
</div>

</div>

<!-- レポート -->
<div id="reportPage" style="display:none;">
<div class="card">

<h2>レポート</h2>

<input type="number" id="yearPicker">

<h3 id="yearTotal"></h3>

<div id="chart"></div>

<button id="backBtn" onclick="backToReport()" style="display:none;">←戻る</button>

<ul id="reportList"></ul>

</div>
</div>

<script src="app.js"></script>
</body>
</html>
